# =============================================================================
# Fireplace Agent вҖ” custom Hermes skin
# =============================================================================
# Renders the branded TUI surface. Dropped at $FH/skins/fireplace.yaml and
# selected via config.yaml display.skin: fireplace.
#
# Hermes skin engine (hermes_cli/skin_engine.py): a custom skin inherits any
# UNSET key from the built-in 'default' skin, so we only override what brands
# Fireplace. Color values are hex strings; banner_logo is Rich-markup ASCII art.
# Palette is a warm-orange set anchored on the Fireplace accent #FF6A3D.
# =============================================================================

name: fireplace
description: Fireplace Agent вҖ” prediction-market trading & research desk (warm orange flame theme).

# -----------------------------------------------------------------------------
# Branding strings (override Hermes/Nous defaults)
# -----------------------------------------------------------------------------
branding:
  agent_name: "Fireplace Agent"          # default would be 'Hermes Agent'
  response_label: " рҹ”Ҙ Fireplace "        # tag shown on agent responses
  prompt_symbol: "вқҜ"                      # input prompt glyph
  welcome: "рҹ”Ҙ Fireplace Agent вҖ” your prediction-market desk. Read-only by default; run `fireplace enable-trading` to arm execution. What market are we looking at?"
  goodbye: "Books closed. рҹ”Ҙ Stay sharp вҖ” Fireplace out."
  help_header: "рҹ”Ҙ Fireplace Agent вҖ” markets, research, positions & risk"

# -----------------------------------------------------------------------------
# Colors вҖ” warm orange palette anchored on #FF6A3D
# -----------------------------------------------------------------------------
colors:
  # Banner / hero
  banner_accent: "#FF6A3D"               # primary flame accent
  banner_title: "#FF8A5B"                # brighter title text
  banner_border: "#FF6A3D"               # banner frame
  banner_dim: "#7A3520"                  # dim ember tone
  banner_text: "#FFD9C7"                 # light warm body text
  # UI chrome
  ui_accent: "#FF6A3D"                   # primary UI accent
  ui_label: "#FFB089"                    # labels / secondary headings
  ui_ok: "#5FD08A"                       # success (kept green for readability)
  ui_error: "#FF4D4D"                    # errors
  ui_warn: "#FFB347"                     # warnings (amber)
  # Prompt / input
  prompt: "#FF6A3D"
  input_rule: "#7A3520"
  # Responses
  response_border: "#FF8A5B"
  # Session panel
  session_label: "#FFB089"
  session_border: "#FF6A3D"
  # Status bar & completion menu
  status_bar_bg: "#2A1208"
  completion_menu_bg: "#2A1208"
  completion_menu_current_bg: "#FF6A3D"

