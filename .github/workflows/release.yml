name: release

# On a version tag, build the runtime image and publish it to GHCR so the
# installer can `docker pull` it (fast) instead of every user building locally.
on:
  push:
    tags: ["v*"]
  workflow_dispatch: {}   # allow manual rebuilds (e.g. to refresh the multi-arch image)

jobs:
  image:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Read versions
        id: v
        run: |
          echo "bundle=$(cat VERSION)" >> "$GITHUB_OUTPUT"
          echo "engine=$(cat ENGINE_VERSION)" >> "$GITHUB_OUTPUT"

      # QEMU enables cross-building the arm64 image on the amd64 runner.
      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Image repo is lowercased to satisfy GHCR (must match FIREPLACE_IMAGE_REPO
      # in install.sh: ghcr.io/enclave-money/fireplace-agent).
      - name: Build & push runtime image
        uses: docker/build-push-action@v6
        with:
          context: bundle/docker
          push: true
          platforms: linux/amd64,linux/arm64
          provenance: mode=max   # SLSA provenance attestation (supply-chain integrity)
          sbom: true
          tags: |
            ghcr.io/enclave-money/fireplace-agent:${{ steps.v.outputs.bundle }}
            ghcr.io/enclave-money/fireplace-agent:latest
          # Pins the engine to the same release the bundle expects.
          build-args: |
            HERMES_SPEC=hermes-agent[all]==0.17.0

      - name: Reminder
        run: echo "Make the GHCR package PUBLIC (Packages → fireplace-agent → Settings → Change visibility) so 'docker pull' needs no auth."
